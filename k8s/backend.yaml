apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2 # Scale to 2 replicas for high availability
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          # In a real environment, you'd use a public/private registry image like 'yourdockerhub/collab-backend:latest'
          # Here we use the local image built by Docker Compose
          image: collab-canvas-main2-backend:latest 
          imagePullPolicy: Never # Forces K8s to use the local docker image
          ports:
            - containerPort: 5001
          envFrom:
            - configMapRef:
                name: collab-config
            - secretRef:
                name: collab-secret
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 5001
      targetPort: 5001
